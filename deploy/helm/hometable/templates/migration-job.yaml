apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "hometable.fullname" . }}-migrate
  labels:
    {{- include "hometable.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    # Run Alembic migrations before the app rolls out.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "hometable.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "hometable.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "hometable.backendImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "hometable.dbSecretName" . }}
                  key: {{ include "hometable.dbSecretKey" . }}
