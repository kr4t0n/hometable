{{- if not .Values.postgres.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hometable.fullname" . }}-db
  labels:
    {{- include "hometable.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ required "Set postgres.url or postgres.existingSecret" .Values.postgres.url | quote }}
{{- end }}
{{- if not .Values.s3.existingSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hometable.fullname" . }}-s3
  labels:
    {{- include "hometable.labels" . | nindent 4 }}
type: Opaque
stringData:
  S3_ACCESS_KEY_ID: {{ required "Set s3.accessKeyId or s3.existingSecret" .Values.s3.accessKeyId | quote }}
  S3_SECRET_ACCESS_KEY: {{ required "Set s3.secretAccessKey or s3.existingSecret" .Values.s3.secretAccessKey | quote }}
{{- end }}
