apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hometable.fullname" . }}-backend
  labels:
    {{- include "hometable.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "hometable.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "hometable.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "hometable.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: {{ include "hometable.backendImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Migrations run as a pre-upgrade Job, so the pods only serve.
          command: ["uvicorn", "hometable.main:app", "--host", "0.0.0.0", "--port", "{{ .Values.backend.port }}"]
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
          envFrom:
            - configMapRef:
                name: {{ include "hometable.fullname" . }}-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "hometable.dbSecretName" . }}
                  key: {{ include "hometable.dbSecretKey" . }}
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "hometable.s3SecretName" . }}
                  key: {{ include "hometable.s3AccessKeyKey" . }}
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "hometable.s3SecretName" . }}
                  key: {{ include "hometable.s3SecretKeyKey" . }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          {{- with .Values.backend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
