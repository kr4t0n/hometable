{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "hometable.fullname" . }}
  labels:
    {{- include "hometable.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    # secretName is optional: cert-manager-style controllers need it (where the
    # issued cert is stored), but Tailscale provisions the cert itself from the
    # tls hosts and needs no secretName. Omit it for Tailscale.
    - hosts:
        - {{ .Values.ingress.host | quote }}
      {{- with .Values.ingress.tls.secretName }}
      secretName: {{ . }}
      {{- end }}
  {{- end }}
  rules:
    # All traffic goes to the frontend, which serves the SPA and proxies /api
    # to the backend Service in-cluster.
    - host: {{ required "ingress.host is required" .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "hometable.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.port }}
{{- end }}
