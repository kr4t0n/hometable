# hometable Helm chart — deploys the app only; Postgres and MinIO are EXTERNAL.

nameOverride: ""
fullnameOverride: ""

image:
  # Published to Docker Hub by .github/workflows/docker-publish.yml. Both
  # images are tagged with the app version on `vX.Y.Z` releases, so the
  # empty `tag` below resolves (via _helpers.tpl) to .Chart.AppVersion —
  # keep Chart.yaml's appVersion in lockstep with the release tag.
  backend:
    repository: kr4t0n/hometable-backend
    tag: "" # defaults to .Chart.AppVersion
  frontend:
    repository: kr4t0n/hometable-frontend
    tag: ""
  pullPolicy: IfNotPresent
imagePullSecrets: []

backend:
  replicas: 2
  port: 8000
  env: production
  maxUploadMb: 512
  mediaPresignExpiry: 3600
  corsOrigins: "" # usually unnecessary — the frontend proxies /api same-origin
  resources: {}

frontend:
  replicas: 2
  port: 80
  resources: {}

# ── External Postgres ────────────────────────────────────────────────
# Provide the SQLAlchemy URL via an existing Secret (recommended) or inline.
postgres:
  existingSecret: "" # name of a Secret holding the DATABASE_URL
  existingSecretKey: DATABASE_URL
  url: "" # used only if existingSecret is empty
  # e.g. postgresql+psycopg://hometable:password@postgres.db.svc:5432/hometable

# ── External S3 / MinIO ──────────────────────────────────────────────
s3:
  endpoint: "" # in-cluster, server-side — e.g. http://minio.minio.svc:9000
  publicEndpoint: "" # browser-reachable, used to SIGN presigned URLs — e.g. https://minio.example.com
  bucket: hometable-media
  region: us-east-1
  existingSecret: "" # Secret with keys S3_ACCESS_KEY_ID and S3_SECRET_ACCESS_KEY
  accessKeyId: "" # used only if existingSecret is empty
  secretAccessKey: ""

ingress:
  enabled: true
  className: ""
  annotations: {}
  host: hometable.example.com
  tls:
    enabled: false
    secretName: ""

serviceAccount:
  create: true
  name: ""

podAnnotations: {}
