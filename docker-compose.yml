# Dev / CI stack: bundles the app's dependencies (Postgres + MinIO) for local work.
# Production does NOT use this — it uses the Helm chart with EXTERNAL Postgres + MinIO.
name: hometable

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hometable
      POSTGRES_PASSWORD: hometable
      POSTGRES_DB: hometable
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hometable -d hometable"]
      interval: 5s
      timeout: 5s
      retries: 10

  storage:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console (http://localhost:9001)
    volumes:
      - miniodata:/data

  # One-shot job: create the media bucket once MinIO is reachable, then exit.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      - storage
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://storage:9000 minioadmin minioadmin; do
        echo 'waiting for minio...'; sleep 1;
      done;
      mc mb --ignore-existing local/hometable-media;
      echo 'bucket ready: hometable-media';
      "

volumes:
  pgdata:
  miniodata:
