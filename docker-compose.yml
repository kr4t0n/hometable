# Dev / CI stack: builds and runs the whole app plus its dependencies
# (Postgres + MinIO). Production does NOT use this — it uses the Helm chart
# with EXTERNAL Postgres + MinIO.
#
# S3_PUBLIC_ENDPOINT / CORS_ORIGINS are read from the root .env (used to sign
# browser-facing media URLs — set it to a host the browser can reach).
name: hometable

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hometable
      POSTGRES_PASSWORD: hometable
      POSTGRES_DB: hometable
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hometable -d hometable"]
      interval: 5s
      timeout: 5s
      retries: 10

  storage:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console (http://localhost:9001)
    volumes:
      - miniodata:/data

  # One-shot job: create the media bucket once MinIO is reachable, then exit.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      - storage
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://storage:9000 minioadmin minioadmin; do
        echo 'waiting for minio...'; sleep 1;
      done;
      mc mb --ignore-existing local/hometable-media;
      echo 'bucket ready: hometable-media';
      "

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      storage:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg://hometable:hometable@db:5432/hometable
      S3_ENDPOINT_URL: http://storage:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: hometable-media
      S3_REGION: us-east-1
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      ENV: production
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_HOST: backend
      BACKEND_PORT: "8000"
    ports:
      - "5173:80"

volumes:
  pgdata:
  miniodata:
